name: activity-logs
label: Activity Log
labelPlural: Activity Logs

fields:
  entityType:
    type: enum
    values: [task, project, subtask]
    required: true
  action:
    type: enum
    values: [created, status_changed, assigned, unassigned, edited, deleted, completed, promoted]
    required: true
  metadata:
    type: text
    required: false
    max: 5000

timestamps: false

behaviors:
  assignable: false
  orderable: false
  softDelete: false
  immutable: true

access:
  scope: authenticated
  permissions:
    create: authenticated
    read: authenticated
    update: false
    delete: false

operations:
  create: true
  read: true
  update: false
  delete: false

views:
  default:
    defaultView: list
    enabledViews: [list]

indexes:
  - name: by_entityType_entityId
    fields: [entityType, entityId]
